name: Auditd Syntax Checks

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update package information
        run: sudo apt update

      - name: Install auditd
        run: sudo apt install -y auditd

      - name: Start auditd
        run: if ! (systemctl is-active auditd); then sudo systemctl start auditd; fi

      - name: Remove default rules
        run: |
          sudo ls -l /etc/audit/rules.d/
          sudo rm /etc/audit/audit.rules
          sudo rm -rf /etc/audit/rules.d
          sudo mkdir /etc/audit/rules.d

      - name: Copy rules file to rules directory
        run: sudo cp $GITHUB_WORKSPACE/rulesets/*.rules /etc/audit/rules.d/

      - name: Check rules
        run: sudo augenrules --check 2>&1

      - name: Load rules via augenrules
        run: sudo augenrules --load 2>&1
        
      - name: Check line count for compiled rule file
        run: sudo wc -l /etc/audit/audit.rules
        
      - name: Print the rules via auditctl
        run: sudo auditctl -l
        
      - name: List out files in rules.d directory
        run: sudo ls -lh /etc/audit/rules.d/
